name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flask App Test
        run: |
          python -c "
          from app import app
          client = app.test_client()
          r = client.get('/')
          assert r.status_code == 200, f'Expected 200, got {r.status_code}'
          assert b'KIRIJA' in r.data
          print('Flask app test passed!')
          "

      - name: Build Docker image
        run: docker build -t portfolio-app .

      - name: Validate container
        run: |
          docker run -d --name portfolio-test -p 5000:5000 portfolio-app
          sleep 5
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/ > /dev/null; then
              echo "Container is healthy"
              docker stop portfolio-test
              exit 0
            fi
            sleep 2
          done
          echo "Container health check failed"
          docker logs portfolio-test
          docker stop portfolio-test
          exit 1

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK secret not set. Skipping auto-deploy."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
          echo "Deployment triggered on Render."
